services:
  api:
    container_name: cofloww-api
    build:
      context: ./api
      target: prod
    env_file:
      - ./api/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - npm-network
      - cofloww-internal
    restart: unless-stopped

  web:
    container_name: cofloww-web
    build:
      context: ./web
      target: prod
    networks:
      - npm-network
    depends_on:
      - api
    restart: unless-stopped

  db:
    container_name: cofloww-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - cofloww_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cofloww-internal
    restart: unless-stopped
  
networks:
  npm-network:
    external: true
  cofloww-internal:
    driver: bridge

volumes:
  cofloww_pgdata:
