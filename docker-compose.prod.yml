services:

  api:
    container_name: cofloww-api
    build:
      context: ./api
      target: prod
    env_file: ./api/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - cofloww_storage:/var/www/api/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - npm-network
      - cofloww-internal
    restart: unless-stopped

  queue:
    container_name: cofloww-queue
    build:
      context: ./api
      target: prod
    env_file: ./api/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - cofloww_storage:/var/www/api/storage
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cofloww-internal
    restart: unless-stopped

  web:
    container_name: cofloww-web
    build:
      context: ./web
      target: prod
      args:
        VITE_API_URL: https://api.cofloww.app
    networks:
      - npm-network
    restart: unless-stopped

  db:
    container_name: cofloww-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - cofloww_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cofloww-internal
    restart: unless-stopped

  redis:
    container_name: cofloww-redis
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - cofloww_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cofloww-internal
    restart: unless-stopped

networks:
  npm-network:
    external: true
  cofloww-internal:
    driver: bridge

volumes:
  cofloww_pgdata:
  cofloww_redis:
  cofloww_storage:
